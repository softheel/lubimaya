# Nginx-конфиг для lubimaya
#
# Установка на VPS:
#   sudo cp deploy/nginx/lubimaya.conf /etc/nginx/sites-available/lubimaya
#   sudo nano /etc/nginx/sites-available/lubimaya   # замените YOUR_DOMAIN_OR_IP
#   sudo ln -s /etc/nginx/sites-available/lubimaya /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Вариант A — с доменом (раскомментируйте server_name с доменом):
#   server_name lubimaya.ru www.lubimaya.ru;
#
# Вариант B — только IP (оставьте как есть или укажите IP):
#   server_name 123.456.789.012;

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    root /var/www/lubimaya/frontend/build;
    index index.html;

    client_max_body_size 10M;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:5001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# После привязки домена — HTTPS:
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d ваш-домен.ru -d www.ваш-домен.ru
